user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;


events {
	worker_connections  1024;
}

http {

	include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

	log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
	access_log  /var/log/nginx/access.log  main;

    sendfile        on;

    keepalive_timeout  65;

	gzip on;
    gzip_static on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

	upstream backend_sef_cli {
		server sef-cli:9041;
		keepalive 32;
	}

	server {
		listen 80;
		listen 443 ssl;
		server_name sef-cli.lindebot.com;

		ssl_certificate /etc/nginx/ssl/lindebot.com.pem;
		ssl_certificate_key /etc/nginx/ssl/lindebot.com.key;

		if ($scheme != "https") {
			return 301 https://$host$request_uri;
		}

		# WebSocket（必須在 /sef-cli 之前，Nginx 以最長前綴優先）
		location /sef-cli/ws/ {
			proxy_pass http://backend_sef_cli/sef-cli/ws/;

			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto https;

			proxy_buffering off;
			proxy_request_buffering off;
			tcp_nodelay on;

			proxy_read_timeout 3600s;
			proxy_send_timeout 3600s;

			allow all;
		}

		# REST API（使用 keepalive pool）
		location /sef-cli {
			proxy_pass http://backend_sef_cli/sef-cli;

			proxy_http_version 1.1;
			proxy_set_header Connection "";
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto https;

			allow all;
		}

		location /sef-cli/swagger-ui {
			proxy_pass http://sef-cli:9041/sef-cli/swagger-ui;

			proxy_ssl_verify off;

			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto https;

			# 只允許特定 IP 存取 Swagger 依狀況調整
			allow 172.72.0.0/16;
			deny all;
		}

		location / {
			root   /usr/share/nginx/html/sef-cli;
            index  index.html;
            try_files $uri $uri/ /index.html;
			allow all;
		}
	}

}
